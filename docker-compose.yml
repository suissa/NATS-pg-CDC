services:
  # PostgreSQL with logical replication enabled for CDC testing
  postgres:
    image: postgres:17
    container_name: outboxx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: outboxx_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./dev/postgres/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./dev/postgres/postgres.conf:/etc/postgresql/postgresql.conf
      - ./dev/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf
    command: >
      postgres
      -c config_file=/etc/postgresql/postgresql.conf
      -c hba_file=/etc/postgresql/pg_hba.conf
      -c listen_addresses='*'
      -c log_statement=all
      -c log_min_messages=info
    networks:
      - outboxx-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d outboxx_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  # NATS server for CDC message delivery
  nats:
    image: nats:2.11-alpine
    container_name: outboxx-nats
    restart: unless-stopped
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-js", "-m", "8222"]
    networks:
      - outboxx-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: outboxx_postgres_data

networks:
  outboxx-network:
    driver: bridge
    name: outboxx-network
